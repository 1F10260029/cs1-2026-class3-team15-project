    </head>

    <body>

        <div class="container">

            <aside class="sidebar">
                <h1>タイトル</h1>
                <nav>
                    <ul>
                         <li><a href="index.html">ホーム</a></li>

                         <li><a href="index.html#news">ニュース</a></li>

                         <li><a href="page3.html">ページ3</a></li>

                    音楽に関する画像
                </div>
                <h2>お気に入りの音楽を見つけよう</h2>

            
            <section class="summary-section">
                <h2 class="accordion">サイト概要▼</h2>
                
                <div class="panel">
                    <p>このサイトでは製作者のおすすめのアーティストを紹介しています。</p>
                </div>
            </section>

            <section class="feature-section">
                <h2 class="accordion">サイトの特徴</h2>
                <div class="panel">
                    <ul>
                        <li>代表曲がすぐわかる</li>
                        <li>様々なジャンルの音楽を紹介</li>
                        <li>まだ知らないアーティスト、曲に出会える</li>
                    </ul>
                </div>
            </section>
            
            <section class="artist-section">
                <h2 class="accordion">紹介アーティスト一覧</h2>
                
                <div class="panel">                <p>アーティスト名をクリックすると紹介ページに飛べます。</p>
                    <ul class="artist-list">
                        <li><a href="page1.html">アーティスト1</a></li>

                    </ul>
                </div>
            </section>
            
            <section class="image-section">
                <h2>おすすめ音楽イメージ</h2>

            <section id="news" class="news">
                <h1>ニュース</h1>
