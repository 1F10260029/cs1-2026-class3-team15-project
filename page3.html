    <h3>魅力</h3>
    <p>
        WurtSの魅力は、耳に残るキャッチーなメロディと、ロック・ポップ・エレクトロなどを融合した幅広い音楽性です。
        また、共感しやすく独特な歌詞や、作詞・作曲から映像まで手がける高いセルフプロデュース力も特徴です。
        ライブでは迫力のあるパフォーマンスで、音源とは違った魅力を楽しめます。
    </p>
